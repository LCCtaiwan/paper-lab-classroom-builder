name: Bug report
description: Report a reproducible Paper Lab defect without private course data.
title: "[Bug] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: Do not attach private PDFs, patient data, invite codes, or secret management links.
  - type: input
    id: version
    attributes:
      label: Version or commit
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Reproduction steps
      description: Use the synthetic demo PDF when possible.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected result
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual result
    validations:
      required: true
  - type: checkboxes
    id: privacy
    attributes:
      label: Privacy check
      options:
        - label: I removed secrets, patient data, and unlicensed course material.
          required: true
